<!DOCTYPE html>
<html>
<head>
  <title>Soft Quota Calculator</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      background: linear-gradient(135deg, #eef2f7, #f8fbff);
      padding: 30px;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      width: 750px;
      margin: auto;
    }

    h2 {
      margin-bottom: 15px;
      color: #2c3e50;
    }

    input {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      text-align: center;
      width: 90px;
    }

    input[type="text"] {
      width: 140px;
      text-align: left;
    }

    input:focus {
      border-color: #007bff;
      outline: none;
      box-shadow: 0 0 4px rgba(0,123,255,0.4);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background: #007bff;
      color: #fff;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    tbody tr:hover {
      background: #f4f9ff;
    }

    .max {
      font-weight: bold;
      color: #28a745;
    }

    .btn {
      margin-top: 12px;
      margin-right: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    #addRow {
      background: #6c757d;
      color: #fff;
    }

    .deleteRow {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      background: #f1f8ff;
      border-left: 5px solid #007bff;
    }

    .error {
      color: red;
      font-weight: bold;
    }

    .total-box {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Soft Quota Calculator</h2>

  <div class="total-box">
    Total Quota:
    <input type="number" id="totalQuota" value="500">
  </div>

  <table id="quotaTable">
    <thead>
      <tr>
        <th>Cell Name</th>
        <th>Min</th>
        <th>Current</th>
        <th>Max</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td><input type="text" class="cellName" placeholder="Cell 1"></td>
        <td><input type="number" class="min" value="100"></td>
        <td><input type="number" class="current" value="0"></td>
        <td class="max">-</td>
        <td><button class="deleteRow">❌</button></td>
      </tr>

      <tr>
        <td><input type="text" class="cellName" placeholder="Cell 2"></td>
        <td><input type="number" class="min" value="100"></td>
        <td><input type="number" class="current" value="0"></td>
        <td class="max">-</td>
        <td><button class="deleteRow">❌</button></td>
      </tr>
    </tbody>
  </table>

  <button class="btn" id="addRow">+ Add Cell</button>

  <div class="result" id="summary"></div>

</div>

<script>
$(function () {

  // ➕ Add Row
  $("#addRow").click(function () {

    let count = $("#quotaTable tbody tr").length + 1;

    $("#quotaTable tbody").append(`
      <tr>
        <td><input type="text" class="cellName" placeholder="Cell ${count}"></td>
        <td><input type="number" class="min" value="0"></td>
        <td><input type="number" class="current" value="0"></td>
        <td class="max">-</td>
        <td><button class="deleteRow">❌</button></td>
      </tr>
    `);

  });

  // ❌ Delete Row
  $(document).on("click", ".deleteRow", function () {
    $(this).closest("tr").remove();
    calculate();
  });

  // 🔄 Auto calculate
  $(document).on("input", "input", function () {
    calculate();
  });

  function calculate() {

    let totalQuota = parseInt($("#totalQuota").val()) || 0;

    let mins = [];
    let currents = [];

    $("#quotaTable tbody tr").each(function () {
      let min = parseInt($(this).find(".min").val()) || 0;
      let current = parseInt($(this).find(".current").val()) || 0;

      mins.push(min);
      currents.push(current);
    });

    let totalMin = mins.reduce((a, b) => a + b, 0);
    let float = totalQuota - totalMin;

    if (float < 0) {
      $("#summary").html(`<span class="error">❌ Total quota is less than total minimum!</span>`);
      return;
    }

    let extraUsed = currents.map((val, i) => Math.max(0, val - mins[i]));
    let totalExtraUsed = extraUsed.reduce((a, b) => a + b, 0);

    $("#quotaTable tbody tr").each(function (index) {

      let min = mins[index];
      let max = min + float - (totalExtraUsed - extraUsed[index]);

      $(this).find(".max").text(max);

    });

    $("#summary").html(`
      <b>Total Min:</b> ${totalMin} <br>
      <b>Float:</b> ${float} <br>
      <b>Extra Used:</b> ${totalExtraUsed}
    `);

  }

  // initial run
  calculate();

});
</script>

</body>
</html>
